scrape_configs:
  - job_name: "njump-us"
    scrape_interval: 15s
    metrics_path: /metrics/shared
    static_configs:
      - targets: ["nostr-net-us:80"]
        labels:
          app: njump
          region: us
          env: prod

  - job_name: "njump-sg"
    scrape_interval: 15s
    metrics_path: /metrics/shared
    static_configs:
      - targets: ["nostr-net-sg:80"]
        labels:
          app: njump
          region: sg
          env: prod

